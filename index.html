<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Afiliados que acuden a votar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    /* LOGIN */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #f2f4f7;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
	  padding: 15px;
    }

    .login-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-card input {
      width: 93%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .login-card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #007bff;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    .login-error {
      color: red;
      text-align: center;
      display: none;
      margin-top: 10px;
    }

    header {
      background: #48B04B;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 70px;
    }

    header div{
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    header img {
      width: 60px;
      margin-right: 15px;
    }

    .container {
      padding: 10px;
    }

    .card {
      flex-wrap: wrap;
      background: white;
      margin: 8px 0;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 90%;
    }

    .dni {
      font-size: 12px;
      font-weight: bold;
    }

    .nombre {
      font-size: 16px;
      width: 100%;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 25px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #ccc;
      border-radius: 25px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 19px;
      width: 19px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #27ae60;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .search-bar {
      position: sticky;
      top: 0;
      background: #ffffff;
      padding: 10px;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-bar input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .badge {
      background: #e74c3c;
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="_0xlogin">Entrar</button>
    <div id="loginError" class="login-error">Credenciales incorrectas</div>
  </div>
</div>

<header>
  <img src="https://listascorreo.csif.es/archivos/a21/image/csifBlanco.png" />
  <div>
    <strong>JORNADA ELECTORAL - Interventores de mesa</strong>
    Control de afiliados que acuden a votar
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Buscar por nombre o DNI..." />
  <div id="pendingBadge" class="badge">0</div>
</div>

<div class="container" id="app">
  <div class="loading">Cargando datos...</div>
</div>
