<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Afiliados que acuden a votar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    /* LOGIN */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #f2f4f7;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
	  padding: 15px;
    }

    .login-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-card input {
      width: 93%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .login-card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #007bff;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    .login-error {
      color: red;
      text-align: center;
      display: none;
      margin-top: 10px;
    }

    header {
      background: #48B04B;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 70px;
    }

    header div{
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    header img {
      width: 60px;
      margin-right: 15px;
    }

    .container {
      padding: 10px;
    }

    .card {
      flex-wrap: wrap;
      background: white;
      margin: 8px 0;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 90%;
    }

    .dni {
      font-size: 12px;
      font-weight: bold;
    }

    .nombre {
      font-size: 16px;
      width: 100%;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 25px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #ccc;
      border-radius: 25px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 19px;
      width: 19px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #27ae60;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .search-bar {
      position: sticky;
      top: 0;
      background: #ffffff;
      padding: 10px;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-bar input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .badge {
      background: #e74c3c;
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <div id="loginError" class="login-error">Credenciales incorrectas</div>
  </div>
</div>

<header>
  <img src="https://listascorreo.csif.es/archivos/a21/image/csifBlanco.png" />
  <div>
    <strong>JORNADA ELECTORAL - Interventores de mesa</strong>
    Control de afiliados que acuden a votar
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Buscar por nombre o DNI..." />
  <div id="pendingBadge" class="badge">0</div>
</div>

<div class="container" id="app">
  <div class="loading">Cargando datos...</div>
</div>

  const USERNAME = "21232f297a57a5a743894a0e4a801fc3";
  const PASSWORD = "81dc9bdb52d04dc20036dbd8313ed055";

  function login() {
    const user = md5(document.getElementById("user").value);
    const pass = md5(document.getElementById("pass").value);

    if (user === USERNAME && pass === PASSWORD) {
      document.getElementById("loginScreen").style.display = "none";
	  setCookie("sesion", "1", 1);
	  document.getElementById("app").innerHTML = "Cargando datos...";
      cargarDatos();
    } else {
      document.getElementById("loginError").style.display = "block";
    }
  }

  const API_URL = "https://script.google.com/macros/s/AKfycbwueoPMySpi7YtdCwkDOHb8TvBR3hxLj6hUNQFo01BBLM5hri_wUx0ffT8VZWxN8ceR/exec";

  let pendientes = 0;

  async function cargarDatos() {
  	if(pendientes==0){
		document.getElementById("pendingBadge").style.display = "none";
		const res = await fetch(API_URL);
		const data = await res.json();

		const texto = document.getElementById("searchInput").value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
		const filtrados = data.filter(p =>
		  p.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(texto) ||
		  p.dni.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(texto)
		);

		const container = document.getElementById("app");
		container.innerHTML = "";
		
		if(filtrados.length>0){
			filtrados.forEach(p => {
			  const card = document.createElement("div");
			  card.className = "card";

			  const checked = p.vota === true || p.vota === "TRUE";

			  card.innerHTML = `
				<div class="info">
				  <div class="dni">***${p.dni.substring(3,7)}**</div>
				  <div class="nombre">${p.nombre}</div>
				</div>
				<label class="switch">
				  <input type="checkbox" ${checked ? "checked" : ""}>
				  <span class="slider"></span>
				</label>
			  `;

			  const checkbox = card.querySelector("input");
			  checkbox.addEventListener("change", () => {
				actualizar(p.dni, checkbox.checked);
			  });

			  container.appendChild(card);
			});
		}else
			document.getElementById("app").innerHTML = "No hay nadie con ese Nombre o DNI";
	}
	//setCookie("sesion", "1", 1);
  }

  function actualizar(dni, activo) {
    pendientes++;
    actualizarBadge();

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({ dni, activo })
    })
    .then(() => {
      pendientes--;
      actualizarBadge();
      mostrarToast("Guardado ✔");
    })
    .catch(() => {
      pendientes--;
      actualizarBadge();
      mostrarToast("Error ❌");
    });
  }

  function actualizarBadge() {
    const badge = document.getElementById("pendingBadge");
    badge.textContent = pendientes;
    badge.style.display = pendientes > 0 ? "flex" : "none";
  }

  function mostrarToast(mensaje) {
    if(pendientes==0){
		const toast = document.getElementById("toast");
		toast.textContent = mensaje;
		toast.style.display = "block";

		setTimeout(() => {
		  toast.style.display = "none";
		}, 2000)
	}
  }
  
  function setCookie(nombre, valor, minutos) {
    let fecha = new Date();
    fecha.setTime(fecha.getTime() + (minutos * 60 * 60 * 1000));
    let expires = "expires=" + fecha.toUTCString();
    document.cookie = nombre + "=" + encodeURIComponent(valor) + ";" + expires + ";path=/";
  }
  
  function getCookie(nombre) {
    let nombreEQ = nombre + "=";
    let cookies = document.cookie.split(';');

    for (let i = 0; i < cookies.length; i++) {
      let c = cookies[i].trim();
      if (c.indexOf(nombreEQ) === 0) {
        return decodeURIComponent(c.substring(nombreEQ.length, c.length));
      }
    }
    return null;
  }

<div id="toast" style="
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #2c3e50;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
